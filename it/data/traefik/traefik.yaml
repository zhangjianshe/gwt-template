global:
  checkNewVersion: false
  sendAnonymousUsage: false
log:
  level: INFO
api:
  dashboard: true
  insecure: true
entryPoints:
  web:
    address: :80
  websecure:
    address: ":443"
  ldaps:
    address: ":636/tcp"
  ssh:
    address: ":2222"
serversTransports:
  default:
    insecureSkipVerify: true
    forwardingTimeouts:
      idleConnTimeout: 0
      readIdleTimeout: 0
      responseHeaderTimeout: 0

providers:
  docker:
    exposedByDefault: false
  file:
    directory: /etc/traefik/dynamic
    watch: true
  http:
    endpoint: "http://dev-app:8080/api/v1/traefik/index"
    pollInterval: "5s"

certificatesResolvers:
  powerdns:
    acme:
      email: zhangjianshe@gmail.com
      storage: /certs/acme.json
      caServer: https://step-ca:9000/acme/satway-acme/directory
      dnsChallenge:
        provider: pdns
        resolvers:
          - "172.25.0.100:53"
        propagation:
          disableChecks: true