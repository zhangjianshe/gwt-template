# 强行启用 PostgreSQL 后端
launch=gpgsql
gpgsql-host=powerdns-db
gpgsql-user=powerdns
gpgsql-dbname=powerdns
gpgsql-password=powerdns-security-pwd

# 强行开启 Webserver 和 API 供 pdns-admin 连接
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0
api=yes
api-key=let_china_great_again

loglevel=2
log-dns-queries=yes
log-dns-details=yes
logging-facility=0

# The default TTL applied to records created via the HTTP API when not specified
default-ttl=60

# The TTL value used for automatically generated SOA records
default-soa-edit-signed=0
